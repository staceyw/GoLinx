# GoLinx configuration
# Copy to golinx.toml and edit for your environment.

# Listener URIs (at least one required)
#   http://[addr]:port                              - plain HTTP
#   https://[addr]:port;cert=<path>;key=<path>      - HTTPS with your own certs
#   ts+https://:port                                - Tailscale HTTPS (auto certs)
#   ts+http://:port                                 - Tailscale plain HTTP
# Host must be empty or an IP address — no hostnames.

listen = [
  # "http://:8080",
  # "https://:443;cert=./cert.pem;key=./key.pem",
  # "ts+https://:443",
  # "ts+http://:80",
]

# Tailscale node hostname (required for ts+* listeners)
# ts-hostname = "go"

# Enable verbose tsnet logging (default: false)
verbose = false

# Tailscale state directory (default: OS config dir, e.g. ~/.config/tsnet-golinx)
# Override for Docker or other environments where you need a specific path.
# ts-dir = "/data/tsnet"

# Maximum link chain resolution depth (default: 5)
# Controls how many hops a redirect follows through other local links,
# and the loop detection depth when creating/updating links.
# max-resolve-depth = 5

# Admin users — Tailscale logins that can toggle admin mode to bypass ownership checks.
# admins = ["alice@example.com", "bob@example.com"]
